<!DOCTYPE html>
<html lang="id">
<head>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | HOMEDRESS_NA</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login { width: 100%; max-width: 400px; padding: 40px; background: #1a1a1a; border-radius: 16px; border: 1px solid #333; }
    .login__logo { text-align: center; font-size: 1.5rem; font-weight: 700; letter-spacing: 2px; margin-bottom: 8px; }
    .login__subtitle { text-align: center; color: #888; font-size: 0.9rem; margin-bottom: 32px; }
    .login__group { margin-bottom: 20px; }
    .login__label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 6px; }
    .login__input { width: 100%; padding: 12px 16px; background: #222; border: 1.5px solid #444; border-radius: 8px; color: #fff; font-size: 1rem; font-family: inherit; }
    .login__input:focus { border-color: #fff; outline: none; }
    .login__btn { width: 100%; padding: 14px; background: #fff; color: #000; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .login__btn:hover { background: #e0e0e0; }
    .login__btn:disabled { opacity: 0.5; }
    .login__error { color: #e74c3c; font-size: 0.85rem; margin-top: 12px; text-align: center; display: none; }
    .login__back { text-align: center; margin-top: 20px; }
    .login__back a { color: #888; font-size: 0.85rem; text-decoration: none; }
  </style>
</head>
<body>
  <div class="login">
    <div class="login__logo">HOMEDRESS_NA</div>
    <p class="login__subtitle">Admin Dashboard</p>
    <form id="login-form">
      <div class="login__group">
        <label class="login__label">Email</label>
        <input type="email" class="login__input" id="login-email" required placeholder="admin@homedress.com" />
      </div>
      <div class="login__group">
        <label class="login__label">Password</label>
        <input type="password" class="login__input" id="login-password" required placeholder="••••••••" />
      </div>
      <button type="submit" class="login__btn" id="login-btn">MASUK</button>
      <div class="login__error" id="login-error"></div>
    </form>
    <div class="login__back"><a href="/">← Kembali ke Website</a></div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = import.meta.env?.VITE_SUPABASE_URL || 'https://owajvfwhhdhvhrwjbkmd.supabase.co';
    const SUPABASE_ANON_KEY = import.meta.env?.VITE_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93YWp2ZndoaGRodmhyd2pia21kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NTIzODQsImV4cCI6MjA5MzQyODM4NH0.1VTziUISWA69HlhPCRnPZ2mWQmJIcVAGlMdoF3T0nO4';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Check if already logged in
    const { data: { session } } = await supabase.auth.getSession();
    if (session) window.location.href = '/admin/';

    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('login-error');

    // Handle unauthorized error from redirect
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('error') === 'unauthorized') {
      errorEl.textContent = 'Hanya Admin yang diizinkan masuk.';
      errorEl.style.display = 'block';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      btn.disabled = true;
      btn.textContent = 'Memproses...';
      errorEl.style.display = 'none';

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        errorEl.textContent = 'Email atau password salah';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'MASUK';
        return;
      }

      window.location.href = '/admin/';
    });
  </script>
</body>
</html>
