<!DOCTYPE html>
<html lang="id">
<head>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta charset="UTF-8">
  <title>Kelola Promo & Banner | Admin HOMEDRESS_NA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body style="background:#111;color:#fff;">
  <div class="admin">
    <aside class="sidebar">
      <div class="sidebar__logo">HOMEDRESS_NA</div>
      <p class="sidebar__subtitle">Admin Panel</p>
      <nav class="sidebar__nav">
        <a href="/admin/" class="sidebar__link">📊 Dashboard</a>
        <a href="/admin/orders.html" class="sidebar__link">📦 Pesanan</a>
        <a href="/admin/products.html" class="sidebar__link">🛍️ Produk</a>
        <a href="/admin/categories.html" class="sidebar__link">📁 Kategori</a>
        <a href="/admin/menus.html" class="sidebar__link">🔗 Menu Navigasi</a>
        <a href="/admin/hero.html" class="sidebar__link">🖼️ Hero Slider</a>
        <a href="/admin/featured.html" class="sidebar__link sidebar__link--active">✨ Promo & Banner</a>
        <a href="/admin/settings.html" class="sidebar__link">⚙️ Pengaturan Web</a>
        <hr style="border-color:#333;margin:16px 0;" />
        <a href="/" class="sidebar__link" target="_blank">🌐 Lihat Website</a>
        <button class="sidebar__link sidebar__logout" id="logout-btn">🚪 Logout</button>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
      <div class="admin-header">
        <h1>✨ Kelola Promo & Banner Spesial</h1>
        <button class="admin-btn admin-btn--primary" id="add-featured-btn">+ Tambah Banner</button>
      </div>

      <!-- Featured Grid -->
      <div id="featured-grid" style="display:grid;grid-template-columns:1fr;gap:20px;margin-top:20px;">
        <p style="color:#888;">Memuat data...</p>
      </div>

      <!-- Add/Edit Modal -->
      <div id="featured-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:999;overflow-y:auto;padding:40px 20px;">
        <div style="max-width:600px;margin:0 auto;background:#1a1a1a;border-radius:16px;padding:32px;border:1px solid #333;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
            <h2 id="modal-title">Tambah Banner</h2>
            <button class="admin-btn admin-btn--outline admin-btn--small" id="close-modal">✕</button>
          </div>
          <form id="featured-form">
            <input type="hidden" id="feat-id" />
            
            <div class="admin-form__group">
              <label class="admin-form__label">Tipe Banner *</label>
              <select class="admin-form__input" id="feat-type" required style="background:#222;color:#fff;">
                <option value="pinned_banner">Banner Lebar (Scroll Homepage)</option>
                <option value="floating_promo">Pop-up Promo Diskon (Kanan Bawah)</option>
              </select>
            </div>

            <div class="admin-form__group">
              <label class="admin-form__label">Judul Utama / Tipe Promo *</label>
              <input class="admin-form__input" id="feat-title" placeholder="Cth: NAILA SET VOL.2 atau DISKON 50%" required />
            </div>

            <div class="admin-form__group">
              <label class="admin-form__label">Sub Judul / Deskripsi</label>
              <textarea class="admin-form__textarea" id="feat-subtitle" placeholder="Deskripsi singkat produk atau info diskon"></textarea>
            </div>

            <div class="admin-form__group">
              <label class="admin-form__label">Slug Produk Target (Tanpa URL) *</label>
              <input class="admin-form__input" id="feat-slug" placeholder="Cth: tasya-set-cargo" required />
              <small style="color:#888;">ID produk dari tabel Produk agar tombol 'Shop Now' berfungsi.</small>
            </div>

            <div class="admin-form__group">
              <label class="admin-form__label">URL Gambar (Opsional)</label>
              <input class="admin-form__input" id="feat-img" placeholder="https://..." />
            </div>

            <div class="admin-form__group">
              <label class="admin-form__label">URL Video MP4 (Opsional)</label>
              <input class="admin-form__input" id="feat-vid" placeholder="https://...mp4" />
            </div>

            <div class="admin-form__group">
              <label class="admin-form__label">Urutan Tampil (Order)</label>
              <input type="number" class="admin-form__input" id="feat-order" value="0" />
            </div>

            <div style="display:flex;gap:12px;margin-top:16px;">
              <button type="submit" class="admin-btn admin-btn--primary">Simpan</button>
              <button type="button" class="admin-btn admin-btn--outline" id="close-modal-2">Batal</button>
            </div>
          </form>
        </div>
      </div>

    </main>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    const supabase = createClient('https://owajvfwhhdhvhrwjbkmd.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93YWp2ZndoaGRodmhyd2pia21kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NTIzODQsImV4cCI6MjA5MzQyODM4NH0.1VTziUISWA69HlhPCRnPZ2mWQmJIcVAGlMdoF3T0nO4');

    const { data: { session } } = await supabase.auth.getSession();
    const ADMIN_EMAIL = 'homedressnaweb@gmail.com';
    if (!session || session.user.email.toLowerCase() !== ADMIN_EMAIL) {
      if (session) await supabase.auth.signOut();
      window.location.href = '/admin/login.html?error=unauthorized';
      throw new Error('Unauthorized');
    }
    const token = session.access_token;

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await supabase.auth.signOut();
      window.location.href = '/admin/login.html';
    });

    const modal = document.getElementById('featured-modal');
    const form = document.getElementById('featured-form');

    document.getElementById('add-featured-btn').addEventListener('click', () => {
      form.reset();
      document.getElementById('feat-id').value = '';
      document.getElementById('modal-title').textContent = 'Tambah Banner/Promo';
      modal.style.display = 'block';
    });

    document.getElementById('close-modal').addEventListener('click', () => modal.style.display = 'none');
    document.getElementById('close-modal-2').addEventListener('click', () => modal.style.display = 'none');

    // Unified Upload Logic
    window.handleFeatUpload = async function(fileInputId, targetInputId, statusId) {
      const fileInput = document.getElementById(fileInputId);
      const targetInput = document.getElementById(targetInputId);
      const statusEl = document.getElementById(statusId);
      
      if (!fileInput.files || fileInput.files.length === 0) return;

      const file = fileInput.files[0];
      statusEl.textContent = '⏳ Menyiapkan...';
      statusEl.style.color = '#f39c12';

      try {
        const timestamp = Math.round(new Date().getTime() / 1000);
        const folder = 'homedress_na/featured';
        const signRes = await fetch('/api/admin/cloudinary-sign', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ timestamp, folder })
        });
        const { signature, api_key, cloud_name } = await signRes.json();

        statusEl.textContent = '⏳ Mengirim...';
        const formData = new FormData();
        formData.append('file', file);
        formData.append('api_key', api_key);
        formData.append('timestamp', timestamp);
        formData.append('signature', signature);
        formData.append('folder', folder);

        const uploadRes = await fetch(`https://api.cloudinary.com/v1_1/${cloud_name}/auto/upload`, {
          method: 'POST',
          body: formData
        });

        const data = await uploadRes.json();
        if (data.secure_url) {
          targetInput.value = data.secure_url;
          statusEl.textContent = '✅ Berhasil!';
          statusEl.style.color = '#27ae60';
        } else {
          throw new Error(data.error?.message || 'Gagal');
        }
      } catch (err) {
        statusEl.textContent = '❌ Gagal';
        statusEl.style.color = '#e74c3c';
      }
    };

    // Inject Upload UI
    const imgInp = document.getElementById('feat-img');
    const vidInp = document.getElementById('feat-vid');
    
    imgInp.insertAdjacentHTML('afterend', `
      <div style="display:flex; gap:8px; margin-top:8px;">
        <input type="file" id="feat-img-upload" accept="image/*" style="display:none;" onchange="handleFeatUpload('feat-img-upload', 'feat-img', 'feat-img-status')" />
        <button type="button" class="admin-btn admin-btn--outline admin-btn--small" onclick="document.getElementById('feat-img-upload').click()">📁 Upload Gambar</button>
      </div>
      <p id="feat-img-status" style="font-size:0.8rem; margin-top:4px;"></p>
    `);

    vidInp.insertAdjacentHTML('afterend', `
      <div style="display:flex; gap:8px; margin-top:8px;">
        <input type="file" id="feat-vid-upload" accept="video/*" style="display:none;" onchange="handleFeatUpload('feat-vid-upload', 'feat-vid', 'feat-vid-status')" />
        <button type="button" class="admin-btn admin-btn--outline admin-btn--small" onclick="document.getElementById('feat-vid-upload').click()">📁 Upload Video</button>
      </div>
      <p id="feat-vid-status" style="font-size:0.8rem; margin-top:4px;"></p>
    `);

    async function loadFeatured() {
      const res = await fetch('/api/admin/featured', { headers: { 'Authorization': `Bearer ${token}` }});
      const data = await res.json();
      const featured = data.featured || [];

      const grid = document.getElementById('featured-grid');
      if (featured.length === 0) { grid.innerHTML = '<p style="color:#888;">Belum ada banner.</p>'; return; }

      grid.innerHTML = featured.map(f => `
        <div style="background:#222; padding:16px; border-radius:8px; border:1px solid #333; display:flex; gap:16px; align-items:center;">
          ${f.image_url ? `<img src="${f.image_url}" style="width:100px; height:100px; object-fit:cover; border-radius:8px;" />` : '<div style="width:100px;height:100px;background:#111;border-radius:8px;"></div>'}
          <div style="flex:1;">
            <span style="background:var(--color-accent);color:#000;padding:2px 6px;border-radius:4px;font-size:0.75rem;font-weight:bold;">${f.type === 'pinned_banner' ? 'BANNER LEBAR' : 'POP-UP PROMO'}</span>
            <h3 style="margin:8px 0 4px;">${f.title}</h3>
            <p style="color:#888;font-size:0.85rem;margin:0 0 8px;">Target: /product.html?id=${f.product_slug}</p>
            <p style="color:#aaa;font-size:0.85rem;">Urutan: ${f.order_index}</p>
          </div>
          <div style="display:flex; flex-direction:column; gap:8px;">
            <button class="admin-btn admin-btn--outline admin-btn--small" onclick="editFeatured('${f.id}')">✏️ Edit</button>
            <button class="admin-btn admin-btn--danger admin-btn--small" onclick="deleteFeatured('${f.id}')">🗑️ Hapus</button>
          </div>
        </div>
      `).join('');

      window._featured = featured;
    }

    window.editFeatured = function(id) {
      const f = window._featured.find(x => x.id === id);
      if (!f) return;
      document.getElementById('feat-id').value = f.id;
      document.getElementById('feat-type').value = f.type;
      document.getElementById('feat-title').value = f.title;
      document.getElementById('feat-subtitle').value = f.subtitle || '';
      document.getElementById('feat-slug').value = f.product_slug;
      document.getElementById('feat-img').value = f.image_url || '';
      document.getElementById('feat-vid').value = f.video_url || '';
      document.getElementById('feat-order').value = f.order_index || 0;
      document.getElementById('modal-title').textContent = 'Edit Banner/Promo';
      modal.style.display = 'block';
    };

    window.deleteFeatured = async function(id) {
      if (!confirm('Hapus banner ini?')) return;
      const res = await fetch('/api/admin/featured', {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
      });
      if (res.ok) { loadFeatured(); showToast('Dihapus!'); }
    };

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        type: document.getElementById('feat-type').value,
        title: document.getElementById('feat-title').value,
        subtitle: document.getElementById('feat-subtitle').value,
        product_slug: document.getElementById('feat-slug').value,
        image_url: document.getElementById('feat-img').value || null,
        video_url: document.getElementById('feat-vid').value || null,
        order_index: parseInt(document.getElementById('feat-order').value) || 0,
        is_active: true
      };
      const id = document.getElementById('feat-id').value;
      if (id) payload.id = id;

      const res = await fetch('/api/admin/featured', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (res.ok) {
        modal.style.display = 'none';
        loadFeatured();
        showToast('Tersimpan!');
      } else {
        alert('Gagal menyimpan');
      }
    });

    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'admin-toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => { t.style.opacity = '1'; }, 10);
      setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
    }

    loadFeatured();
  </script>
</body>
</html>
