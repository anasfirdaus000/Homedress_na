<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Kelola Menu Navigasi | Admin HOMEDRESS_NA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body style="background:#111;color:#fff;">
  <div class="admin">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar__logo">HOMEDRESS_NA</div>
      <p class="sidebar__subtitle">Admin Panel</p>
      <nav class="sidebar__nav">
        <a href="/admin/" class="sidebar__link">📊 Dashboard</a>
        <a href="/admin/orders.html" class="sidebar__link">📦 Pesanan</a>
        <a href="/admin/products.html" class="sidebar__link">🛍️ Produk</a>
        <a href="/admin/categories.html" class="sidebar__link">📁 Kategori</a>
        <a href="/admin/menus.html" class="sidebar__link sidebar__link--active">🔗 Menu Navigasi</a>
        <a href="/admin/hero.html" class="sidebar__link">🖼️ Hero Slider</a>
        <a href="/admin/featured.html" class="sidebar__link">✨ Promo & Banner</a>
        <a href="/admin/settings.html" class="sidebar__link">⚙️ Pengaturan Web</a>
        <hr style="border-color:#333;margin:16px 0;" />
        <a href="/" class="sidebar__link" target="_blank">🌐 Lihat Website</a>
        <button class="sidebar__link sidebar__logout" id="logout-btn">🚪 Logout</button>
      </nav>
    </aside>

    <main class="admin-main">
      <div class="admin-header">
        <h1>🔗 Kelola Menu Navigasi</h1>
        <button class="admin-btn admin-btn--primary" id="add-menu-btn">+ Tambah Menu</button>
      </div>

      <div style="margin-top:20px; background:#1a1a1a; padding:24px; border-radius:12px; border:1px solid #333;">
        <div id="menu-tree">
          <p style="color:#888;">Memuat data...</p>
        </div>
      </div>

      <!-- Add/Edit Modal -->
      <div id="menu-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:999;overflow-y:auto;padding:40px 20px;">
        <div style="max-width:500px;margin:0 auto;background:#1a1a1a;border-radius:16px;padding:32px;border:1px solid #333;">
          <h2 id="modal-title" style="margin-bottom:24px;">Tambah Menu</h2>
          <form id="menu-form">
            <input type="hidden" id="menu-id" />
            
            <div class="admin-form__group">
              <label class="admin-form__label">Label Menu *</label>
              <input class="admin-form__input" id="menu-label" placeholder="Cth: Best Seller" required />
            </div>

            <div class="admin-form__group">
              <label class="admin-form__label">Grup Menu *</label>
              <select class="admin-form__input" id="menu-group" required style="background:#222;color:#fff;">
                <option value="main_nav">Navigasi Utama (Header)</option>
                <option value="footer_shop">Footer - SHOP</option>
                <option value="footer_explore">Footer - EXPLORE</option>
                <option value="footer_care">Footer - CUSTOMER CARE</option>
              </select>
            </div>

            <div class="admin-form__group">
              <label class="admin-form__label">Menu Induk (Parent) - Kosongkan jika menu utama</label>
              <select class="admin-form__input" id="menu-parent" style="background:#222;color:#fff;">
                <option value="">(Tidak ada / Menu Utama)</option>
              </select>
            </div>

            <div class="admin-form__group">
              <label class="admin-form__label">Link ke Kategori</label>
              <select class="admin-form__input" id="menu-cat" style="background:#222;color:#fff;">
                <option value="">(Pilih Kategori)</option>
              </select>
            </div>

            <div class="admin-form__group">
              <label class="admin-form__label">Atau URL Kustom (Opsional)</label>
              <input class="admin-form__input" id="menu-url" placeholder="Cth: /promo.html" />
            </div>

            <div class="admin-form__group">
              <label class="admin-form__label">Urutan (Order)</label>
              <input type="number" class="admin-form__input" id="menu-order" value="0" />
            </div>

            <div style="display:flex;gap:12px;margin-top:16px;">
              <button type="submit" class="admin-btn admin-btn--primary">Simpan</button>
              <button type="button" class="admin-btn admin-btn--outline" id="close-modal">Batal</button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    const supabase = createClient('https://owajvfwhhdhvhrwjbkmd.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93YWp2ZndoaGRodmhyd2pia21kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NTIzODQsImV4cCI6MjA5MzQyODM4NH0.1VTziUISWA69HlhPCRnPZ2mWQmJIcVAGlMdoF3T0nO4');

    const { data: { session } } = await supabase.auth.getSession();
    if (!session) { window.location.href = '/admin/login.html'; throw new Error('Not auth'); }
    const token = session.access_token;

    const modal = document.getElementById('menu-modal');
    const form = document.getElementById('menu-form');
    const treeEl = document.getElementById('menu-tree');

    document.getElementById('add-menu-btn').addEventListener('click', () => {
      form.reset();
      document.getElementById('menu-id').value = '';
      modal.style.display = 'block';
    });

    document.getElementById('close-modal').addEventListener('click', () => modal.style.display = 'none');

    async function loadData() {
      // Load Categories for the dropdown
      const catRes = await fetch('/api/categories');
      const catData = await catRes.json();
      const catSelect = document.getElementById('menu-cat');
      catSelect.innerHTML = '<option value="">(Pilih Kategori)</option>' + 
        catData.categories.map(c => `<option value="${c.slug}">${c.name}</option>`).join('');

      // Load Menus
      const res = await fetch('/api/admin/menus', { headers: { 'Authorization': `Bearer ${token}` }});
      const data = await res.json();
      const menus = data.menus || [];
      window._menus = menus;

      // Update Parent Select
      const parentSelect = document.getElementById('menu-parent');
      parentSelect.innerHTML = '<option value="">(Tidak ada / Menu Utama)</option>' + 
        menus.filter(m => !m.parent_id).map(m => `<option value="${m.id}">${m.label} (${m.menu_group})</option>`).join('');

      renderMenuTree(menus);
    }

    function renderMenuTree(menus) {
      const groups = ['main_nav', 'footer_shop', 'footer_explore', 'footer_care'];
      treeEl.innerHTML = groups.map(g => {
        const rootItems = menus.filter(m => m.menu_group === g && !m.parent_id);
        return `
          <div style="margin-bottom:32px;">
            <h2 style="font-size:1.1rem; border-bottom:1px solid #333; padding-bottom:8px; margin-bottom:16px; color:var(--color-accent);">${g.replace('_', ' ').toUpperCase()}</h2>
            ${rootItems.length === 0 ? '<p style="color:#444;">Kosong</p>' : rootItems.map(item => renderMenuItem(item, menus)).join('')}
          </div>
        `;
      }).join('');
    }

    function renderMenuItem(item, allMenus, depth = 0) {
      const children = allMenus.filter(m => m.parent_id === item.id);
      return `
        <div style="margin-left:${depth * 24}px; padding:12px; border-left:2px solid #333; background:rgba(255,255,255,0.02); margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;">
          <div>
            <strong>${item.label}</strong>
            <span style="color:#666; font-size:0.8rem; margin-left:10px;">${item.category_slug ? '-> ' + item.category_slug : (item.custom_url || '')}</span>
          </div>
          <div style="display:flex; gap:8px;">
            <button class="admin-btn admin-btn--outline admin-btn--small" onclick="editMenu('${item.id}')">✏️</button>
            <button class="admin-btn admin-btn--danger admin-btn--small" onclick="deleteMenu('${item.id}')">🗑️</button>
          </div>
        </div>
        ${children.map(child => renderMenuItem(child, allMenus, depth + 1)).join('')}
      `;
    }

    window.editMenu = function(id) {
      const m = window._menus.find(x => x.id === id);
      if (!m) return;
      document.getElementById('menu-id').value = m.id;
      document.getElementById('menu-label').value = m.label;
      document.getElementById('menu-group').value = m.menu_group;
      document.getElementById('menu-parent').value = m.parent_id || '';
      document.getElementById('menu-cat').value = m.category_slug || '';
      document.getElementById('menu-url').value = m.custom_url || '';
      document.getElementById('menu-order').value = m.order_index || 0;
      modal.style.display = 'block';
    };

    window.deleteMenu = async function(id) {
      if (!confirm('Hapus menu ini? Semua sub-menu juga akan terhapus.')) return;
      await fetch('/api/admin/menus', {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
      });
      loadData();
    };

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        id: document.getElementById('menu-id').value || undefined,
        label: document.getElementById('menu-label').value,
        menu_group: document.getElementById('menu-group').value,
        parent_id: document.getElementById('menu-parent').value || null,
        category_slug: document.getElementById('menu-cat').value || null,
        custom_url: document.getElementById('menu-url').value || null,
        order_index: parseInt(document.getElementById('menu-order').value) || 0
      };
      const res = await fetch('/api/admin/menus', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (res.ok) { modal.style.display = 'none'; loadData(); }
    });

    loadData();
  </script>
</body>
</html>
