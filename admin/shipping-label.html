<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Cetak Label Pengiriman</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; padding: 20px; background: #f0f0f0; }

    .label-container { 
      background: #fff; 
      width: 100%; 
      max-width: 500px; 
      margin: 0 auto; 
      padding: 30px; 
      border: 2px solid #000;
    }

    .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #000; padding-bottom: 15px; margin-bottom: 20px; }
    .header-logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -1px; }
    .header-right { text-align: right; }
    .courier-name { font-size: 1.2rem; font-weight: 700; }
    .order-num { font-size: 0.8rem; color: #666; margin-top: 4px; }
    
    .resi-box {
      background: #000; color: #fff; padding: 12px 16px; border-radius: 4px; margin-bottom: 20px;
      text-align: center; font-family: 'Courier New', monospace;
    }
    .resi-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; color: #ccc; }
    .resi-number { font-size: 1.3rem; font-weight: 800; letter-spacing: 1px; }
    
    .section { margin-bottom: 18px; }
    .section-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: #666; margin-bottom: 5px; letter-spacing: 1px; }
    .name { font-size: 1.2rem; font-weight: 700; }
    .info { font-size: 0.95rem; line-height: 1.5; color: #333; }
    
    .divider { border: none; border-top: 1px dashed #ccc; margin: 16px 0; }

    .items-table { width: 100%; border-collapse: collapse; }
    .items-table th { text-align: left; font-size: 0.75rem; padding: 8px 0; border-bottom: 1px solid #ddd; text-transform: uppercase; color: #888; letter-spacing: 0.5px; }
    .items-table td { padding: 8px 0; font-size: 0.9rem; border-bottom: 1px solid #eee; }

    .totals { margin-top: 16px; padding-top: 12px; border-top: 2px solid #000; }
    .total-row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 0.9rem; }
    .total-row--grand { font-size: 1.1rem; font-weight: 800; margin-top: 8px; padding-top: 8px; border-top: 1px solid #eee; }
    
    .footer { margin-top: 20px; text-align: center; font-size: 0.75rem; color: #999; border-top: 1px solid #eee; padding-top: 12px; }
    
    .no-print { text-align: center; margin-bottom: 20px; }
    .btn-print { padding: 12px 28px; background: #000; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 1rem; }
    .btn-print:hover { background: #333; }

    @media print {
      body { background: #fff; padding: 0; }
      .label-container { border: 2px solid #000; margin: 0; width: 100%; max-width: none; }
      .no-print { display: none; }
    }

    .error-msg { text-align: center; padding: 40px; color: #cc0000; }
    .loading { text-align: center; padding: 40px; color: #888; }
  </style>
</head>
<body>

  <div class="no-print">
    <button class="btn-print" onclick="window.print()">🖨️ CETAK LABEL</button>
  </div>

  <div class="label-container" id="label-content">
    <div class="loading">⏳ Memuat data pesanan...</div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    const supabase = createClient('https://owajvfwhhdhvhrwjbkmd.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93YWp2ZndoaGRodmhyd2pia21kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NTIzODQsImV4cCI6MjA5MzQyODM4NH0.1VTziUISWA69HlhPCRnPZ2mWQmJIcVAGlMdoF3T0nO4');

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const orderId = params.get('id');
      const container = document.getElementById('label-content');

      if (!orderId) {
        container.innerHTML = '<div class="error-msg">❌ Parameter order ID tidak ditemukan.</div>';
        return;
      }

      try {
        // Check if user is admin (required to view orders)
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) {
          container.innerHTML = '<div class="error-msg">⚠️ Anda harus login sebagai admin untuk melihat label.</div>';
          return;
        }

        // Fetch order via admin API to bypass RLS
        const res = await fetch(`/api/admin/orders?id=${orderId}`, {
          headers: { 'Authorization': `Bearer ${session.access_token}` }
        });

        if (!res.ok) throw new Error('Gagal mengambil data pesanan');
        const data = await res.json();
        
        // API might return single order or array
        const o = data.order || data.orders?.[0] || data;
        
        if (!o || !o.order_number) {
          container.innerHTML = '<div class="error-msg">❌ Pesanan tidak ditemukan.</div>';
          return;
        }

        const items = o.order_items || [];
        const resi = o.shipping_tracking_number || o.tracking_number || '';

        container.innerHTML = `
          <div class="header">
            <div class="header-logo">HOMEDRESS_NA</div>
            <div class="header-right">
              <div class="courier-name">${o.shipping_courier_name || 'Kurir'}</div>
              <div class="order-num">${o.order_number}</div>
            </div>
          </div>

          ${resi ? `
          <div class="resi-box">
            <div class="resi-label">Nomor Resi</div>
            <div class="resi-number">${resi}</div>
          </div>
          ` : `
          <div style="background:#fff3cd;border:1px solid #ffc107;padding:10px;border-radius:4px;margin-bottom:16px;text-align:center;font-size:0.85rem;color:#856404;">
            ⚠️ Nomor resi belum tersedia. Gunakan "AUTO RESI" atau input manual.
          </div>
          `}

          <div class="section">
            <div class="section-label">Penerima</div>
            <div class="name">${o.customer_name}</div>
            <div class="info">
              📞 ${o.customer_phone}<br>
              📍 ${o.shipping_address}<br>
              <strong>${o.destination_name || [o.city, o.province].filter(Boolean).join(', ')} ${o.postal_code || ''}</strong>
            </div>
          </div>

          <hr class="divider">

          <div class="section">
            <div class="section-label">Pengirim</div>
            <div class="info">
              <strong>${o.origin_name || 'HOMEDRESS_NA'}</strong><br>
              📞 ${'6285216854492'}
            </div>
          </div>

          <hr class="divider">

          ${o.notes ? `
          <div class="section" style="background:#f9f9f9;padding:10px;border-radius:4px;">
            <div class="section-label">Catatan</div>
            <div class="info" style="font-size:0.85rem;">${o.notes}</div>
          </div>
          <hr class="divider">
          ` : ''}

          <table class="items-table">
            <thead>
              <tr>
                <th>Produk</th>
                <th style="text-align:center;">Qty</th>
                <th>Size</th>
              </tr>
            </thead>
            <tbody>
              ${items.map(i => `
                <tr>
                  <td>${i.product_name}</td>
                  <td style="text-align:center;">${i.quantity}</td>
                  <td>${i.size || '-'}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>

          <div class="totals">
            <div class="total-row"><span>Subtotal</span><span>Rp ${(o.subtotal || 0).toLocaleString('id-ID')}</span></div>
            <div class="total-row"><span>Ongkir</span><span>Rp ${(o.shipping_cost || 0).toLocaleString('id-ID')}</span></div>
            <div class="total-row total-row--grand"><span>TOTAL</span><span>Rp ${(o.total || 0).toLocaleString('id-ID')}</span></div>
          </div>

          <div class="footer">
            Terima kasih telah berbelanja di HOMEDRESS_NA! 🛍️<br>
            <strong>${o.order_number}</strong> | ${new Date(o.created_at).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' })}
          </div>
        `;

      } catch (err) {
        console.error('Label Error:', err);
        container.innerHTML = `<div class="error-msg">❌ Error: ${err.message}</div>`;
      }
    }

    init();
  </script>
</body>
</html>
