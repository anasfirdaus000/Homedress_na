<!DOCTYPE html>
<html lang="id">
<head>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kelola Pesanan | Admin HOMEDRESS_NA</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body>
  <div class="admin">
    <aside class="sidebar">
      <div class="sidebar__logo">HOMEDRESS_NA</div>
      <p class="sidebar__subtitle">Admin Panel</p>
      <nav class="sidebar__nav">
        <a href="/admin/" class="sidebar__link">📊 Dashboard</a>
        <a href="/admin/orders.html" class="sidebar__link sidebar__link--active">📦 Pesanan</a>
        <a href="/admin/products.html" class="sidebar__link">🛍️ Produk</a>
        <a href="/admin/categories.html" class="sidebar__link">📁 Kategori</a>
        <a href="/admin/menus.html" class="sidebar__link">🔗 Menu Navigasi</a>
        <a href="/admin/hero.html" class="sidebar__link">🖼️ Hero Slider</a>
        <a href="/admin/featured.html" class="sidebar__link">✨ Promo & Banner</a>
        <a href="/admin/about.html" class="sidebar__link">📖 Tentang Kami</a>
        <a href="/admin/settings.html" class="sidebar__link">⚙️ Pengaturan Web</a>
        <hr style="border-color:#333;margin:16px 0;" />
        <a href="/" class="sidebar__link" target="_blank">🌐 Lihat Website</a>
        <button class="sidebar__link sidebar__logout" id="logout-btn">🚪 Logout</button>
      </nav>
    </aside>

    <main class="admin-main">
      <div class="admin-header">
        <h1>📦 Kelola Pesanan</h1>
        <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
          <div style="display:flex;gap:8px;align-items:center;background:#1e293b;padding:4px 12px;border-radius:8px;border:1px solid #334155;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <input type="text" id="filter-date-range" class="admin-form__input" placeholder="Pilih Rentang Tanggal" style="width:220px;margin:0;background:transparent;border:none;color:#fff;font-size:0.85rem;" />
          </div>
          <select id="filter-status" class="admin-form__select" style="width:auto;margin:0;">
            <option value="">Semua Status</option>
            <option value="pending">⏳ Pending</option>
            <option value="confirmed">✅ Konfirmasi</option>
            <option value="processing">📦 Proses</option>
            <option value="shipped">🚚 Kirim</option>
            <option value="completed">🎉 Selesai</option>
            <option value="cancelled">❌ Batal</option>
          </select>
          <button class="admin-btn admin-btn--outline admin-btn--small" onclick="resetFilters()">🔄 Reset</button>
        </div>
      </div>

      <div class="admin-card">
        <div class="table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>No. Order</th>
                <th>Customer</th>
                <th>Items</th>
                <th>Total</th>
                <th>Pembayaran</th>
                <th>Status / Kurir</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="orders-table">
              <tr><td colspan="7" style="text-align:center;color:#888;">Memuat...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
      <!-- Order Details Modal -->
      <div id="order-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;overflow-y:auto;padding:40px 20px;">
        <div style="max-width:600px;margin:0 auto;background:#1a1a1a;border-radius:16px;padding:32px;border:1px solid #333;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
            <h2 id="modal-order-number">Detail Pesanan</h2>
            <button class="admin-btn admin-btn--outline admin-btn--small" onclick="document.getElementById('order-modal').style.display='none'">✕</button>
          </div>
          <div id="modal-order-content" style="color:#ddd;line-height:1.6;font-size:0.95rem;">
            <!-- Rendered by JS -->
          </div>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    const supabase = createClient('https://owajvfwhhdhvhrwjbkmd.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93YWp2ZndoaGRodmhyd2pia21kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NTIzODQsImV4cCI6MjA5MzQyODM4NH0.1VTziUISWA69HlhPCRnPZ2mWQmJIcVAGlMdoF3T0nO4');

    const { data: { session } } = await supabase.auth.getSession();
    const ADMIN_EMAIL = 'homedressnaweb@gmail.com';
    if (!session || session.user.email.toLowerCase() !== ADMIN_EMAIL) {
      if (session) await supabase.auth.signOut();
      window.location.href = '/admin/login.html?error=unauthorized';
      throw new Error('Unauthorized');
    }
    const token = session.access_token;

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await supabase.auth.signOut();
      window.location.href = '/admin/login.html';
    });

    let allOrders = [];

    const statusMap = { pending:'⏳ Pending', confirmed:'✅ Konfirmasi', processing:'📦 Proses', shipped:'🚚 Kirim', completed:'🎉 Selesai', cancelled:'❌ Batal' };
    const nextStatus = { pending:'confirmed', confirmed:'processing', processing:'shipped', shipped:'completed' };

    async function loadOrders() {
      const res = await fetch('/api/admin/orders', { headers: { 'Authorization': `Bearer ${token}` }});
      const data = await res.json();
      allOrders = data.orders || [];
      renderOrders();
    }

    function renderOrders() {
      const statusVal = document.getElementById('filter-status').value;
      const dateRangeVal = document.getElementById('filter-date-range').value;
      
      let filtered = allOrders;

      if (statusVal) filtered = filtered.filter(o => o.status === statusVal);
      
      if (dateRangeVal.includes(' to ')) {
        const [startStr, endStr] = dateRangeVal.split(' to ');
        const start = new Date(startStr);
        const end = new Date(endStr);
        start.setHours(0,0,0,0);
        end.setHours(23,59,59,999);
        filtered = filtered.filter(o => {
          const d = new Date(o.created_at);
          return d >= start && d <= end;
        });
      } else if (dateRangeVal) {
        const singleDate = new Date(dateRangeVal);
        singleDate.setHours(0,0,0,0);
        const nextDay = new Date(singleDate);
        nextDay.setDate(singleDate.getDate() + 1);
        filtered = filtered.filter(o => {
          const d = new Date(o.created_at);
          return d >= singleDate && d < nextDay;
        });
      }

      const tbody = document.getElementById('orders-table');
      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#888;padding:40px;">Tidak ada pesanan ditemukan</td></tr>';
        return;
      }

      tbody.innerHTML = filtered.map(o => {
        const items = (o.order_items || []).map(i => `${i.product_name} x${i.quantity}`).join(', ');
        const next = nextStatus[o.status];
        const resi = o.shipping_tracking_number || '';
        const actionBtns = o.status !== 'completed' && o.status !== 'cancelled'
          ? `<button class="admin-btn ${o.status === 'pending' ? 'admin-btn--outline' : 'admin-btn--success'} admin-btn--small" onclick="updateStatus('${o.id}','${next}')">
               ${o.status === 'pending' ? '📑 KONFIRMASI MANUAL' : (statusMap[next] || '→')}
             </button>
             <button class="admin-btn admin-btn--danger admin-btn--small" onclick="updateStatus('${o.id}','cancelled')" title="Batalkan Pesanan">❌</button>`
          : '<span style="color:#888;font-size:0.8rem;">Final</span>';

        const waBtn = `<a href="https://wa.me/${o.customer_phone.replace(/\D/g,'')}" target="_blank" class="admin-btn admin-btn--outline admin-btn--small" style="margin-top:4px;display:inline-block;">💬 WA</a>`;
        const detailBtn = `<button class="admin-btn admin-btn--outline admin-btn--small" onclick="viewOrderDetails('${o.id}')">👁️ DETAIL</button>`;
        const copyBtn = `<button class="admin-btn admin-btn--outline admin-btn--small" onclick="copyToClipboard('${o.order_number}')">📋</button>`;

        return `<tr>
          <td><strong>${o.order_number}</strong> ${copyBtn}<br><small style="color:#888;">${new Date(o.created_at).toLocaleDateString('id-ID')}</small></td>
          <td>${o.customer_name}<br><small style="color:#888;">${o.customer_phone}</small></td>
          <td style="max-width:200px;font-size:0.8rem;">${items || '-'}</td>
          <td>Rp ${o.total.toLocaleString('id-ID')}</td>
          <td>${o.payment_method}</td>
          <td>
            <span class="status-badge status-badge--${o.status}">${statusMap[o.status] || o.status}</span><br>
            <small style="color:var(--color-accent); font-weight:700;">${o.shipping_courier_name || '-'}</small>
            ${resi ? `<br><small style="color:#4ade80;font-size:0.75rem;font-family:monospace;">📦 ${resi}</small>` : ''}
          </td>
          <td>
            ${actionBtns}<br>
            <div style="margin-top:8px; display:flex; gap:4px; flex-wrap:wrap;">
              ${detailBtn}
              ${(o.status === 'processing' && !resi) ? 
                `<button class="admin-btn admin-btn--primary admin-btn--small" onclick="generateBiteshipResi('${o.id}')" style="background: linear-gradient(135deg, #6366f1, #a855f7);">🚀 AUTO RESI</button>` : ''
              }
              ${(o.status === 'processing' || o.status === 'shipped' || o.status === 'completed') ?
                `<button class="admin-btn admin-btn--outline admin-btn--small" onclick="printLabel('${o.id}')">🖨️ CETAK</button>` : ''
              }
              ${waBtn}
            </div>
          </td>
        </tr>`;
      }).join('');
    }

    window.updateStatus = async function(orderId, status) {
      const payload = { order_id: orderId, status };
      
      if (status === 'shipped') {
        const resi = prompt('Masukkan Nomor Resi:');
        if (!resi) return;
        payload.shipping_tracking_number = resi;
        payload.shipping_courier = prompt('Masukkan Nama Kurir (misal: JNE, J&T):', 'JNE');
      } else {
        if (!confirm(`Ubah status ke "${statusMap[status]}"?`)) return;
      }

      const res = await fetch('/api/admin/orders', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (res.ok) {
        loadOrders();
        showToast('Status berhasil diupdate!');
      }
    };

    window.generateBiteshipResi = async function(orderId) {
      if (!confirm('Buat pengiriman otomatis di Biteship? Saldo Anda akan terpotong sesuai tarif ongkir.')) return;
      
      const btn = event.target;
      const originalText = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '⏳ Processing...';

      try {
        const res = await fetch('/api/shipping/create-shipment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ orderId })
        });

        const data = await res.json();
        if (res.ok) {
          showToast(`✅ Sukses! Resi: ${data.tracking_number}`);
          loadOrders();
        } else {
          alert('Gagal: ' + data.error);
        }
      } catch (err) {
        alert('Error: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = originalText;
      }
    };

    window.copyToClipboard = function(text) {
      navigator.clipboard.writeText(text);
      showToast('Copied!');
    };

    window.viewOrderDetails = function(orderId) {
      const o = allOrders.find(x => x.id === orderId);
      if (!o) return;

      document.getElementById('modal-order-number').textContent = `Pesanan: ${o.order_number}`;
      
      const itemsHtml = (o.order_items || []).map(i => `
        <div style="display:flex;gap:12px;margin-bottom:12px;border-bottom:1px solid #333;padding-bottom:12px;">
          <img src="${i.product_image || '/images/featured_images.png'}" style="width:60px;height:60px;object-fit:cover;border-radius:6px;" />
          <div>
            <div style="font-weight:600;">${i.product_name}</div>
            <div style="font-size:0.85rem;color:#888;">Size: ${i.size || '-'} | Qty: ${i.quantity} | Rp ${i.price_at_time.toLocaleString('id-ID')}</div>
          </div>
        </div>
      `).join('');

      document.getElementById('modal-order-content').innerHTML = `
        <div style="margin-bottom:20px;padding:16px;background:#222;border-radius:8px;">
          <h3 style="margin-top:0;margin-bottom:12px;font-size:1rem;color:#fff;">Informasi Pelanggan</h3>
          <p style="margin:4px 0;"><strong>Nama:</strong> ${o.customer_name}</p>
          <p style="margin:4px 0;"><strong>Telepon:</strong> <a href="https://wa.me/${o.customer_phone.replace(/\D/g,'')}" target="_blank" style="color:var(--color-accent);">${o.customer_phone}</a></p>
          <p style="margin:4px 0;"><strong>Email:</strong> ${o.customer_email || '-'}</p>
        </div>

        <div style="margin-bottom:20px;padding:16px;background:#222;border-radius:8px;">
          <h3 style="margin-top:0;margin-bottom:12px;font-size:1rem;color:#fff;">Alamat & Pengiriman</h3>
          <p style="margin:4px 0;"><strong>Alamat:</strong> ${o.shipping_address}</p>
          <p style="margin:4px 0;"><strong>Kecamatan:</strong> ${o.destination_name || (o.city + ', ' + o.province)} ${o.postal_code || ''}</p>
          <p style="margin:4px 0;"><strong>Kurir Pilihan:</strong> <span style="color:var(--color-accent);font-weight:700;">${o.shipping_courier_name || '-'}</span></p>
          <p style="margin:12px 0 4px 0;border-top:1px dashed #444;padding-top:12px;"><strong>Catatan:</strong> ${o.notes || '-'}</p>
        </div>

        ${o.louvin_transaction_id ? `
        <div style="margin-bottom:20px;padding:16px;background:#1a2b1a;border-radius:8px;border:1px solid #2d4a2d;">
          <h3 style="margin-top:0;margin-bottom:12px;font-size:1rem;color:#4caf50;">💳 Info Pembayaran Louvin</h3>
          <p style="margin:4px 0;"><strong>Trans ID:</strong> ${o.louvin_transaction_id}</p>
          <p style="margin:4px 0;"><strong>Metode:</strong> ${o.payment_method.toUpperCase()}</p>
          ${o.payment_va_number ? `<p style="margin:4px 0;"><strong>VA:</strong> ${o.payment_va_number}</p>` : ''}
          ${o.payment_qr_string ? `<p style="margin:4px 0; font-size:0.8rem; word-break:break-all;"><strong>QR String:</strong> ${o.payment_qr_string}</p>` : ''}
        </div>
        ` : ''}

        <div style="margin-bottom:20px;">
          <h3 style="margin-top:0;margin-bottom:12px;font-size:1rem;color:#fff;">Rincian Produk</h3>
          ${itemsHtml}
        </div>

        <div style="display:flex;justify-content:space-between;font-weight:700;font-size:1.1rem;border-top:1px solid #444;padding-top:16px;color:#fff;">
          <span>Total Akhir</span>
          <span>Rp ${o.total.toLocaleString('id-ID')}</span>
        </div>
      `;

      document.getElementById('order-modal').style.display = 'block';
    };

    window.printLabel = function(orderId) {
      window.open(`/admin/shipping-label.html?id=${orderId}`, '_blank', 'width=800,height=900');
    };

    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'admin-toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    window.resetFilters = function() {
      document.getElementById('filter-status').value = '';
      if (window.fp) window.fp.clear();
      renderOrders();
    };

    // Initialize Flatpickr
    window.fp = flatpickr("#filter-date-range", {
      mode: "range",
      dateFormat: "Y-m-d",
      onChange: function() {
        renderOrders();
      }
    });

    document.getElementById('filter-status').addEventListener('change', renderOrders);
    loadOrders();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
</body>
</html>
