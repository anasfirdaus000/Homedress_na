<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | HOMEDRESS_NA</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    :root { --color-primary: #000; --color-accent: #ff4757; --color-bg: #f8f9fa; }
    body { background: var(--color-bg); font-family: 'DM Sans', sans-serif; }
    .auth-container { 
      max-width: 440px; margin: 60px auto; padding: 48px 40px; 
      background: #fff; border-radius: 20px; 
      box-shadow: 0 20px 40px rgba(0,0,0,0.05);
      text-align: center;
    }
    .auth-logo { font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 32px; display: block; text-decoration: none; color: #000; }
    .auth-title { font-size: 2.4rem; margin-bottom: 12px; font-weight: 700; letter-spacing: -0.5px; }
    .auth-subtitle { color: #888; margin-bottom: 32px; font-size: 1.1rem; line-height: 1.5; }
    .auth-form { display: flex; flex-direction: column; gap: 20px; text-align: left; }
    .auth-group { display: flex; flex-direction: column; gap: 8px; }
    .auth-label { font-size: 0.95rem; font-weight: 600; color: #444; }
    .auth-input { 
      padding: 16px; border: 1.5px solid #eee; border-radius: 12px; font-size: 1.1rem; 
      transition: all 0.3s; background: #fafafa;
    }
    .auth-input:focus { border-color: #000; background: #fff; outline: none; box-shadow: 0 0 0 4px rgba(0,0,0,0.05); }
    .auth-btn { 
      background: #000; color: #fff; border: none; padding: 18px; border-radius: 12px; 
      font-weight: 700; font-size: 1.1rem; cursor: pointer; transition: all 0.3s; 
      margin-top: 12px; letter-spacing: 0.5px;
    }
    .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    .auth-link { color: #000; text-decoration: none; font-weight: 700; border-bottom: 2px solid #eee; transition: all 0.2s; }
    .auth-link:hover { border-color: #000; }
    .auth-error { 
      background: #fff5f5; color: #e74c3c; padding: 12px; border-radius: 8px; 
      font-size: 0.95rem; font-weight: 600; display: none; border: 1px solid #fed7d7;
    }
    .auth-success { 
      background: #f0fff4; color: #27ae60; padding: 12px; border-radius: 8px; 
      font-size: 0.95rem; font-weight: 600; display: none; border: 1px solid #c6f6d5;
    }
  </style>
</head>
<body>
  <!-- HEADER -->
  <header id="header" class="header" style="background:#fff;border-bottom:1px solid #eee;">
    <div class="header__inner">
      <a href="/" class="header__logo">HOMEDRESS_NA</a>
    </div>
  </header>

  <main class="auth-container">
    <a href="/" class="auth-logo">HOMEDRESS_NA</a>
    <h1 class="auth-title">Selamat Datang</h1>
    <p class="auth-subtitle">Silakan login untuk mengakses riwayat pesanan dan checkout lebih cepat.</p>

    <form id="login-form" class="auth-form">
      <div class="auth-group">
        <label class="auth-label">Email</label>
        <input type="email" id="email" class="auth-input" placeholder="name@email.com" required />
      </div>
      <div class="auth-group">
        <label class="auth-label">Password</label>
        <input type="password" id="password" class="auth-input" placeholder="••••••••" required />
      </div>
      <div id="error-msg" class="auth-error"></div>
      <button type="submit" class="auth-btn" id="btn-submit">MASUK KE AKUN</button>
    </form>

    <p style="margin-top: 32px; font-size: 1rem; color: #666;">
      Belum punya akun? <a href="/register.html" class="auth-link">Daftar sekarang</a>
    </p>
  </main>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    // Using process.env vars injected by Vite
    const supabase = createClient('https://owajvfwhhdhvhrwjbkmd.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93YWp2ZndoaGRodmhyd2pia21kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NTIzODQsImV4cCI6MjA5MzQyODM4NH0.1VTziUISWA69HlhPCRnPZ2mWQmJIcVAGlMdoF3T0nO4');

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('error-msg');
      const btn = document.getElementById('btn-submit');

      btn.disabled = true;
      btn.textContent = 'MOHON TUNGGU...';
      errorMsg.style.display = 'none';

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        errorMsg.textContent = error.message === 'Invalid login credentials' ? 'Email atau password salah.' : error.message;
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'LOGIN';
      } else {
        // Redirect to account or checkout based on referrer
        const urlParams = new URLSearchParams(window.location.search);
        const redirect = urlParams.get('redirect') || '/account.html';
        window.location.href = redirect;
      }
    });
  </script>
</body>
</html>
