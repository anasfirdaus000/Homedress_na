<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akun Saya | HOMEDRESS_NA</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    .account-container { max-width: 800px; margin: 60px auto; padding: 20px; }
    .account-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 32px; border-bottom: 1px solid #eee; padding-bottom: 16px; }
    .account-title { font-size: 2rem; font-weight: 700; }
    .btn-logout { background: transparent; border: 1px solid #333; padding: 8px 16px; cursor: pointer; border-radius: 6px; font-weight: 600; }
    
    .profile-card { background: #fafafa; padding: 32px; border-radius: 12px; border: 1px solid #eee; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; color: #555; }
    .form-input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; font-size: 1rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    
    .btn-save { background: var(--color-accent); color: #fff; border: none; padding: 14px 24px; border-radius: 6px; font-weight: 700; cursor: pointer; margin-top: 16px; transition: 0.3s; }
    .btn-save:hover { background: #000; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: #27ae60; color: #fff; padding: 16px 24px; border-radius: 8px; font-weight: 600; display: none; }
  </style>
</head>
<body>
  <!-- HEADER -->
  <header id="header" class="header" style="background:#fff;border-bottom:1px solid #eee;">
    <div class="header__inner">
      <a href="/" class="header__logo">HOMEDRESS_NA</a>
      <nav style="display:flex;gap:20px;">
        <a href="/category.html" style="font-weight:600;color:#000;text-decoration:none;">Belanja</a>
      </nav>
    </div>
  </header>

  <main class="account-container">
    <div class="account-header">
      <div>
        <h1 class="account-title">Akun Saya</h1>
        <p style="color:#666;">Kelola profil dan alamat pengiriman Anda.</p>
      </div>
      <button class="btn-logout" id="btn-logout">Logout</button>
    </div>

    <div class="profile-card" style="margin-bottom:32px;">
      <h2 style="font-size:1.2rem;margin-bottom:24px;">Informasi Pribadi & Alamat</h2>
      <form id="profile-form">
        <div class="form-group">
          <label class="form-label">Nama Lengkap</label>
          <input type="text" id="prof-name" class="form-input" required />
        </div>
        <div class="form-group">
          <label class="form-label">Email (Tidak bisa diubah)</label>
          <input type="email" id="prof-email" class="form-input" disabled style="background:#eee;color:#888;" />
        </div>
        <div class="form-group">
          <label class="form-label">Nomor WhatsApp</label>
          <input type="tel" id="prof-phone" class="form-input" placeholder="0812xxxxxx" required />
        </div>
        <div class="form-group">
          <label class="form-label">Alamat Lengkap (Jalan, RT/RW, No. Rumah)</label>
          <textarea id="prof-address" class="form-input" rows="3" required></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Kota / Kabupaten</label>
            <input type="text" id="prof-city" class="form-input" required />
          </div>
          <div class="form-group">
            <label class="form-label">Provinsi</label>
            <input type="text" id="prof-province" class="form-input" required />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Kode Pos</label>
          <input type="text" id="prof-postal" class="form-input" style="max-width:200px;" required />
        </div>
        <button type="submit" class="btn-save" id="btn-save">Simpan Perubahan</button>
      </form>
    </div>

    <div class="profile-card">
      <h2 style="font-size:1.2rem;margin-bottom:24px;">Riwayat Pesanan</h2>
      <div id="order-history-list">
        <p style="color:#888;text-align:center;padding:20px;">Memuat riwayat pesanan...</p>
      </div>
    </div>
  </main>

  <style>
    .order-item { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid #eee; }
    .order-item:last-child { border-bottom: none; }
    .order-item__info { flex: 1; }
    .order-item__number { font-weight: 700; color: var(--color-black); margin-bottom: 4px; }
    .order-item__date { font-size: 0.85rem; color: #888; }
    .order-item__status { padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
    .status--pending { background: #fff3cd; color: #856404; }
    .status--confirmed { background: #d4edda; color: #155724; }
    .status--processing { background: #cce5ff; color: #004085; }
    .status--shipped { background: #d1ecf1; color: #0c5460; }
    .status--completed { background: #d4edda; color: #155724; }
    .status--cancelled { background: #f8d7da; color: #721c24; }
    .btn-track { font-size: 0.85rem; color: var(--color-accent); font-weight: 600; text-decoration: none; border: 1px solid var(--color-accent); padding: 4px 12px; border-radius: 4px; }
  </style>

  <div id="toast" class="toast">Profil berhasil diperbarui!</div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    const supabase = createClient('https://owajvfwhhdhvhrwjbkmd.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93YWp2ZndoaGRodmhyd2pia21kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NTIzODQsImV4cCI6MjA5MzQyODM4NH0.1VTziUISWA69HlhPCRnPZ2mWQmJIcVAGlMdoF3T0nO4');

    let currentUser = null;

    async function init() {
      const { data: { session }, error } = await supabase.auth.getSession();
      
      if (error || !session) {
        window.location.href = '/login.html';
        return;
      }

      currentUser = session.user;
      document.getElementById('prof-email').value = currentUser.email;

      // Load Profile
      const { data: profile } = await supabase
        .from('user_profiles')
        .select('*')
        .eq('id', currentUser.id)
        .single();

      if (profile) {
        document.getElementById('prof-name').value = profile.full_name || '';
        document.getElementById('prof-phone').value = profile.phone || '';
        document.getElementById('prof-address').value = profile.address || '';
        document.getElementById('prof-city').value = profile.city || '';
        document.getElementById('prof-province').value = profile.province || '';
        document.getElementById('prof-postal').value = profile.postal_code || '';
      }

      loadOrders();
    }

    async function loadOrders() {
      const list = document.getElementById('order-history-list');
      
      const { data: orders, error } = await supabase
        .from('orders')
        .select('*')
        .eq('user_id', currentUser.id)
        .order('created_at', { ascending: false });

      if (error || !orders || orders.length === 0) {
        list.innerHTML = '<p style="color:#888;text-align:center;padding:20px;">Belum ada riwayat pesanan.</p>';
        return;
      }

      list.innerHTML = orders.map(o => `
        <div class="order-item">
          <div class="order-item__info">
            <div class="order-item__number">${o.order_number}</div>
            <div class="order-item__date">${new Date(o.created_at).toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' })}</div>
            <div style="font-size:0.9rem; margin-top:4px;">Total: <strong>Rp ${o.total.toLocaleString('id-ID')}</strong></div>
          </div>
          <div style="text-align:right;">
            <div class="order-item__status status--${o.status}" style="margin-bottom:8px;">${o.status.toUpperCase()}</div>
            <a href="/track-order.html?order_id=${o.order_number}&phone=${o.customer_phone}" class="btn-track">LACAK</a>
          </div>
        </div>
      `).join('');
    }

    document.getElementById('profile-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-save');
      btn.disabled = true;
      btn.textContent = 'Menyimpan...';

      const payload = {
        id: currentUser.id,
        full_name: document.getElementById('prof-name').value,
        phone: document.getElementById('prof-phone').value,
        address: document.getElementById('prof-address').value,
        city: document.getElementById('prof-city').value,
        province: document.getElementById('prof-province').value,
        postal_code: document.getElementById('prof-postal').value,
        updated_at: new Date().toISOString()
      };

      const { error } = await supabase.from('user_profiles').upsert(payload);

      btn.disabled = false;
      btn.textContent = 'Simpan Perubahan';

      if (error) {
        alert('Gagal menyimpan profil: ' + error.message);
      } else {
        const toast = document.getElementById('toast');
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
      }
    });

    document.getElementById('btn-logout').addEventListener('click', async () => {
      await supabase.auth.signOut();
      window.location.href = '/login.html';
    });

    init();
  </script>
</body>
</html>
