<!DOCTYPE html>
<html lang="id">
<head>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout | HOMEDRESS_NA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!-- HEADER -->
  <header id="header" class="header">
    <div class="header__inner">
      <div class="header__left">
        <button id="menu-toggle" class="header__icon-btn" aria-label="Menu">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>
      <div class="header__center">
        <a href="/" id="logo" class="header__logo">HOMEDRESS_NA</a>
      </div>
      <div class="header__right">
        <a href="/account.html" class="header__icon-btn" aria-label="Account">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </a>
      </div>
    </div>
  </header>

  <main style="padding-top: 100px; padding-bottom: 80px; min-height: 80vh; background: #f8fafc;">
    <div class="checkout-container" style="max-width: 1200px; margin: 0 auto; padding: 0 20px;">
      <h1 style="font-size:2.4rem;font-weight:700;color:var(--color-fg);margin-bottom:24px;letter-spacing:-0.5px;">Checkout</h1>
      
      <form id="checkout-form">
        <div class="checkout-layout" style="display: grid; grid-template-columns: 1fr 400px; gap: 40px; align-items: start;">
          
          <!-- LEFT: FORMS -->
          <div class="checkout-left">
            
            <!-- Informasi Kontak -->
            <div class="checkout-section" style="background:#fff; padding:32px; border-radius:16px; border:1px solid #e2e8f0; margin-bottom:24px;">
              <h3 style="margin-top:0; margin-bottom:20px; font-size:1.2rem; font-weight:600;">Informasi Kontak</h3>
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div class="checkout-field">
                  <label for="customer_name" style="display:block; margin-bottom:8px; font-size:0.9rem; font-weight:500; color:#64748b;">Nama Lengkap *</label>
                  <input type="text" id="customer_name" name="customer_name" placeholder="Contoh: Siti Aminah" autocomplete="name" required style="width:100%; padding:14px; border:1px solid #cbd5e1; border-radius:8px; font-size:1rem; outline:none;"/>
                </div>
                <div class="checkout-field">
                  <label for="customer_phone" style="display:block; margin-bottom:8px; font-size:0.9rem; font-weight:500; color:#64748b;">Nomor WhatsApp *</label>
                  <input type="tel" id="customer_phone" name="customer_phone" placeholder="Contoh: 08123456789" autocomplete="tel" required style="width:100%; padding:14px; border:1px solid #cbd5e1; border-radius:8px; font-size:1rem; outline:none;"/>
                </div>
              </div>
              <div class="checkout-field" style="margin-top:16px;">
                <label for="customer_email" style="display:block; margin-bottom:8px; font-size:0.9rem; font-weight:500; color:#64748b;">Email (Opsional)</label>
                <input type="email" id="customer_email" name="customer_email" placeholder="email@contoh.com" autocomplete="email" style="width:100%; padding:14px; border:1px solid #cbd5e1; border-radius:8px; font-size:1rem; outline:none;"/>
              </div>
            </div>

            <!-- Alamat Pengiriman -->
            <div class="checkout-section" style="background:#fff; padding:32px; border-radius:16px; border:1px solid #e2e8f0; margin-bottom:24px;">
              <h3 style="margin-top:0; margin-bottom:20px; font-size:1.2rem; font-weight:600;">Alamat Pengiriman</h3>
              
              <div class="checkout-field" style="position:relative; margin-bottom:16px;">
                <label for="kecamatan-search" style="display:block; margin-bottom:8px; font-size:0.9rem; font-weight:500; color:#64748b;">Cari Kecamatan / Kota *</label>
                <input type="text" id="kecamatan-search" placeholder="Ketik minimal 3 huruf (Cth: Kebayoran Baru)" required autocomplete="off" style="width:100%; padding:14px; border:1px solid #cbd5e1; border-radius:8px; font-size:1rem; outline:none;"/>
                <input type="hidden" name="destination_area_id" id="destination_area_id" required />
                
                <div id="search-results" style="display:none; position:absolute; top:100%; left:0; right:0; background:#fff; border:1px solid #e2e8f0; border-radius:8px; box-shadow:0 10px 15px -3px rgba(0,0,0,0.1); z-index:100; max-height:250px; overflow-y:auto; margin-top:4px;"></div>
              </div>

              <div class="checkout-field" style="margin-bottom:16px;">
                <label for="shipping_address" style="display:block; margin-bottom:8px; font-size:0.9rem; font-weight:500; color:#64748b;">Alamat Lengkap *</label>
                <textarea id="shipping_address" name="shipping_address" placeholder="Nama Jalan, Nomor Rumah, RT/RW, Patokan" autocomplete="shipping address-line1" required style="width:100%; padding:14px; border:1px solid #cbd5e1; border-radius:8px; font-size:1rem; min-height:80px; outline:none; font-family:inherit;"></textarea>
              </div>
              
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div class="checkout-field">
                  <label for="checkout-city" style="display:block; margin-bottom:8px; font-size:0.9rem; font-weight:500; color:#64748b;">Kota/Kabupaten</label>
                  <input type="text" id="checkout-city" name="city" placeholder="Terisi Otomatis" readonly required style="width:100%; padding:14px; border:1px solid #f1f5f9; background:#f1f5f9; border-radius:8px; font-size:1rem; outline:none; color:#64748b;"/>
                </div>
                <div class="checkout-field">
                  <label for="checkout-postal" style="display:block; margin-bottom:8px; font-size:0.9rem; font-weight:500; color:#64748b;">Kode Pos *</label>
                  <input type="text" id="checkout-postal" name="postal_code" placeholder="Cth: 12345" autocomplete="postal-code" required style="width:100%; padding:14px; border:1px solid #cbd5e1; border-radius:8px; font-size:1rem; outline:none;"/>
                </div>
              </div>
            </div>

            <!-- Metode Pengiriman -->
            <div class="checkout-section" style="background:#fff; padding:32px; border-radius:16px; border:1px solid #e2e8f0; margin-bottom:24px;">
              <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h3 style="margin:0; font-size:1.2rem; font-weight:600;">Pilih Kurir Pengiriman</h3>
                <span id="weight-info" style="font-size:0.85rem; color:#64748b; background:#f1f5f9; padding:4px 10px; border-radius:20px;">Berat: 0g</span>
              </div>
              <div id="shipping-options" class="shipping-options-grid" style="display:grid; gap:12px;">
                 <p style="color: #64748b; font-size: 0.95rem;">Silakan cari dan pilih kecamatan Anda terlebih dahulu.</p>
              </div>
            </div>

            <!-- Catatan -->
            <div class="checkout-section" style="background:#fff; padding:32px; border-radius:16px; border:1px solid #e2e8f0;">
              <h3 style="margin-top:0; margin-bottom:16px; font-size:1.2rem; font-weight:600;">Catatan Pesanan (Opsional)</h3>
              <div class="checkout-field">
                <label for="notes" class="sr-only" style="display:none;">Catatan Pesanan</label>
                <textarea id="notes" name="notes" placeholder="Contoh: Tolong bungkus warna hitam ya..." style="width:100%; padding:14px; border:1px solid #cbd5e1; border-radius:8px; font-size:1rem; outline:none; font-family:inherit; min-height:80px;"></textarea>
              </div>
            </div>

          </div>

          <!-- RIGHT: SUMMARY & PAYMENT -->
          <div class="checkout-right" style="position: sticky; top: 120px;">
            
            <div style="background:#fff; padding:32px; border-radius:16px; border:1px solid #e2e8f0; box-shadow:0 4px 6px -1px rgba(0,0,0,0.05);">
              <h3 style="margin-top:0; margin-bottom:20px; font-size:1.2rem; font-weight:600; border-bottom: 1px solid #e2e8f0; padding-bottom:16px;">Ringkasan Pesanan</h3>
              
              <div id="checkout-summary"></div>
              
              <h3 style="margin-top:24px; margin-bottom:16px; font-size:1.1rem; font-weight:600;">Metode Pembayaran</h3>
              <div class="checkout-payment-opt" style="display:flex; flex-direction:column; gap:12px;">
                <label class="payment-label" style="display:flex; align-items:center; gap:12px; cursor:pointer; padding:12px; border:1px solid #cbd5e1; border-radius:8px; transition:0.2s;">
                  <input type="radio" name="payment_method" value="qris" checked style="accent-color:var(--color-accent);"/>
                  <span style="font-weight:500;">QRIS (Otomatis)</span>
                </label>
                <label class="payment-label" style="display:flex; align-items:center; gap:12px; cursor:pointer; padding:12px; border:1px solid #cbd5e1; border-radius:8px; transition:0.2s;">
                  <input type="radio" name="payment_method" value="bni_va" style="accent-color:var(--color-accent);"/>
                  <span style="font-weight:500;">BNI Virtual Account</span>
                </label>
                <label class="payment-label" style="display:flex; align-items:center; gap:12px; cursor:pointer; padding:12px; border:1px solid #cbd5e1; border-radius:8px; transition:0.2s;">
                  <input type="radio" name="payment_method" value="bri_va" style="accent-color:var(--color-accent);"/>
                  <span style="font-weight:500;">BRI Virtual Account</span>
                </label>
                <label class="payment-label" style="display:flex; align-items:center; gap:12px; cursor:pointer; padding:12px; border:1px solid #cbd5e1; border-radius:8px; transition:0.2s;">
                  <input type="radio" name="payment_method" value="gopay" style="accent-color:var(--color-accent);"/>
                  <span style="font-weight:500;">GoPay</span>
                </label>
                <label class="payment-label" style="display:flex; align-items:center; gap:12px; cursor:pointer; padding:12px; border:1px solid #cbd5e1; border-radius:8px; transition:0.2s; background:#f8fafc;">
                  <input type="radio" name="payment_method" value="cod" style="accent-color:var(--color-accent);"/>
                  <div>
                    <div style="font-weight:700; color:var(--color-accent);">Bayar di Tempat (COD)</div>
                    <div style="font-size:0.8rem; color:#64748b; margin-top:2px;">Bayar cash ke kurir saat paket tiba</div>
                  </div>
                </label>
              </div>

              <div id="checkout-error" style="background:#fef2f2; color:#ef4444; padding:12px 16px; border-radius:8px; margin-top:20px; font-size:0.9rem; display:none; border:1px solid #fecaca;"></div>
              
              <button type="submit" id="btn-submit-checkout" class="btn" style="width:100%; padding:18px; margin-top:24px; font-weight:700; font-size:1.1rem; border-radius:8px; background:#0f172a; color:#fff; cursor:pointer; border:none; transition:0.2s;">
                BUAT PESANAN SEKARANG
              </button>
            </div>

          </div>

        </div>
      </form>
    </div>
  </main>

  <!-- FOOTER -->
  <footer id="footer" class="footer">
    <div class="footer__bottom" style="border-top:none;">
      <div class="footer__bottom-center">
        <span>© 2026 HOMEDRESS_NA - Pembayaran Aman 🔒</span>
      </div>
    </div>
  </footer>

  <script src="/products-data.js"></script>
  <script type="module" src="/main.js"></script>
</body>
</html>
