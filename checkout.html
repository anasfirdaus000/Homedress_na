<!DOCTYPE html>
<html lang="id">
<head>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout | HOMEDRESS_NA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!-- HEADER -->
  <header id="header" class="header">
    <div class="header__inner">
      <div class="header__left">
        <button id="menu-toggle" class="header__icon-btn" aria-label="Menu">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>
      <div class="header__center">
        <a href="/" id="logo" class="header__logo">HOMEDRESS_NA</a>
      </div>
      <div class="header__right">
        <a href="/account.html" class="header__icon-btn" aria-label="Account">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </a>
      </div>
    </div>
  </header>

  <main style="padding-top: 100px; padding-bottom: 80px; min-height: 80vh; background: #f8fafc;">
    <div class="checkout-container" style="max-width: 1200px; margin: 0 auto; padding: 0 20px;">
      <h1 style="font-size:2.4rem;font-weight:700;color:var(--color-fg);margin-bottom:24px;letter-spacing:-0.5px;">Checkout</h1>
      
      <form id="checkout-form">
        <div class="checkout-layout" style="display: grid; grid-template-columns: 1fr 400px; gap: 40px; align-items: start;">
          
          <!-- LEFT: FORMS -->
          <div class="checkout-left">
            
            <!-- Informasi Kontak -->
            <div class="checkout-section" style="background:#fff; padding:32px; border-radius:16px; border:1px solid #e2e8f0; margin-bottom:24px;">
              <h3 style="margin-top:0; margin-bottom:20px; font-size:1.2rem; font-weight:600;">Informasi Kontak</h3>
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                 <input type="text" name="customer_name" placeholder="Nama Lengkap" required style="width:100%; padding:14px; border:1px solid #cbd5e1; border-radius:8px; font-size:1rem; outline:none; transition:border-color 0.2s;"/>
                 <input type="tel" name="customer_phone" placeholder="Nomor WhatsApp" required style="width:100%; padding:14px; border:1px solid #cbd5e1; border-radius:8px; font-size:1rem; outline:none; transition:border-color 0.2s;"/>
              </div>
              <input type="email" name="customer_email" placeholder="Email (Opsional)" style="width:100%; padding:14px; border:1px solid #cbd5e1; border-radius:8px; margin-top:16px; font-size:1rem; outline:none;"/>
            </div>

            <!-- Alamat Pengiriman -->
            <div class="checkout-section" style="background:#fff; padding:32px; border-radius:16px; border:1px solid #e2e8f0; margin-bottom:24px;">
              <h3 style="margin-top:0; margin-bottom:20px; font-size:1.2rem; font-weight:600;">Alamat Pengiriman</h3>
              <textarea name="shipping_address" placeholder="Alamat Lengkap (Nama Jalan, No Rumah, RT/RW, Kec/Kel)" required style="width:100%; padding:14px; border:1px solid #cbd5e1; border-radius:8px; font-size:1rem; min-height:100px; margin-bottom:16px; outline:none; font-family:inherit;"></textarea>
              <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                 <input type="text" name="city" placeholder="Kota/Kabupaten" required style="width:100%; padding:14px; border:1px solid #cbd5e1; border-radius:8px; font-size:1rem; outline:none;"/>
                 <input type="text" name="postal_code" placeholder="Kode Pos" required style="width:100%; padding:14px; border:1px solid #cbd5e1; border-radius:8px; font-size:1rem; outline:none;"/>
              </div>
              <select name="province" required style="width:100%; padding:14px; border:1px solid #cbd5e1; border-radius:8px; margin-top:16px; font-size:1rem; background: #fff; outline:none; cursor:pointer;">
                <option value="">Pilih Provinsi</option>
                <optgroup label="Jawa & Bali">
                  <option value="DKI Jakarta">DKI Jakarta</option>
                  <option value="Jawa Barat">Jawa Barat</option>
                  <option value="Jawa Tengah">Jawa Tengah</option>
                  <option value="DI Yogyakarta">DI Yogyakarta</option>
                  <option value="Jawa Timur">Jawa Timur</option>
                  <option value="Banten">Banten</option>
                  <option value="Bali">Bali</option>
                </optgroup>
                <optgroup label="Sumatera">
                  <option value="Aceh">Aceh</option>
                  <option value="Sumatera Utara">Sumatera Utara</option>
                  <option value="Sumatera Barat">Sumatera Barat</option>
                  <option value="Riau">Riau</option>
                  <option value="Kepulauan Riau">Kepulauan Riau</option>
                  <option value="Jambi">Jambi</option>
                  <option value="Sumatera Selatan">Sumatera Selatan</option>
                  <option value="Bangka Belitung">Bangka Belitung</option>
                  <option value="Bengkulu">Bengkulu</option>
                  <option value="Lampung">Lampung</option>
                </optgroup>
                <optgroup label="Kalimantan">
                  <option value="Kalimantan Barat">Kalimantan Barat</option>
                  <option value="Kalimantan Tengah">Kalimantan Tengah</option>
                  <option value="Kalimantan Selatan">Kalimantan Selatan</option>
                  <option value="Kalimantan Timur">Kalimantan Timur</option>
                  <option value="Kalimantan Utara">Kalimantan Utara</option>
                </optgroup>
                <optgroup label="Sulawesi">
                  <option value="Sulawesi Utara">Sulawesi Utara</option>
                  <option value="Sulawesi Tengah">Sulawesi Tengah</option>
                  <option value="Sulawesi Selatan">Sulawesi Selatan</option>
                  <option value="Sulawesi Tenggara">Sulawesi Tenggara</option>
                  <option value="Gorontalo">Gorontalo</option>
                  <option value="Sulawesi Barat">Sulawesi Barat</option>
                </optgroup>
                <optgroup label="Nusa Tenggara & Maluku">
                  <option value="Nusa Tenggara Barat">Nusa Tenggara Barat</option>
                  <option value="Nusa Tenggara Timur">Nusa Tenggara Timur</option>
                  <option value="Maluku">Maluku</option>
                  <option value="Maluku Utara">Maluku Utara</option>
                </optgroup>
                <optgroup label="Papua">
                  <option value="Papua">Papua</option>
                  <option value="Papua Barat">Papua Barat</option>
                  <option value="Papua Tengah">Papua Tengah</option>
                  <option value="Papua Pegunungan">Papua Pegunungan</option>
                  <option value="Papua Selatan">Papua Selatan</option>
                  <option value="Papua Barat Daya">Papua Barat Daya</option>
                </optgroup>
              </select>
            </div>

            <!-- Metode Pengiriman -->
            <div class="checkout-section" style="background:#fff; padding:32px; border-radius:16px; border:1px solid #e2e8f0; margin-bottom:24px;">
              <h3 style="margin-top:0; margin-bottom:20px; font-size:1.2rem; font-weight:600;">Metode Pengiriman</h3>
              <div id="shipping-options">
                 <p style="color: #64748b; font-size: 0.95rem;">Silakan pilih provinsi terlebih dahulu untuk melihat pilihan ongkos kirim.</p>
              </div>
            </div>

            <!-- Catatan -->
            <div class="checkout-section" style="background:#fff; padding:32px; border-radius:16px; border:1px solid #e2e8f0;">
              <h3 style="margin-top:0; margin-bottom:16px; font-size:1.2rem; font-weight:600;">Catatan Pesanan (Opsional)</h3>
              <textarea name="notes" placeholder="Contoh: Tolong bungkus warna hitam ya..." style="width:100%; padding:14px; border:1px solid #cbd5e1; border-radius:8px; font-size:1rem; outline:none; font-family:inherit; min-height:80px;"></textarea>
            </div>

          </div>

          <!-- RIGHT: SUMMARY & PAYMENT -->
          <div class="checkout-right" style="position: sticky; top: 120px;">
            
            <div style="background:#fff; padding:32px; border-radius:16px; border:1px solid #e2e8f0; box-shadow:0 4px 6px -1px rgba(0,0,0,0.05);">
              <h3 style="margin-top:0; margin-bottom:20px; font-size:1.2rem; font-weight:600; border-bottom: 1px solid #e2e8f0; padding-bottom:16px;">Ringkasan Pesanan</h3>
              
              <!-- Dynamic items inserted here by main.js -->
              <div id="checkout-summary"></div>
              
              <!-- Payment Method -->
              <h3 style="margin-top:24px; margin-bottom:16px; font-size:1.1rem; font-weight:600;">Metode Pembayaran</h3>
              <div class="checkout-payment-opt" style="display:flex; flex-direction:column; gap:12px;">
                <label style="display:flex; align-items:center; gap:12px; cursor:pointer; padding:12px; border:1px solid #cbd5e1; border-radius:8px; transition:0.2s;">
                  <input type="radio" name="payment_method" value="qris" checked style="accent-color:var(--color-accent);"/>
                  <span style="font-weight:500;">QRIS (Otomatis)</span>
                </label>
                <label style="display:flex; align-items:center; gap:12px; cursor:pointer; padding:12px; border:1px solid #cbd5e1; border-radius:8px; transition:0.2s;">
                  <input type="radio" name="payment_method" value="bni_va" style="accent-color:var(--color-accent);"/>
                  <span style="font-weight:500;">BNI Virtual Account</span>
                </label>
                <label style="display:flex; align-items:center; gap:12px; cursor:pointer; padding:12px; border:1px solid #cbd5e1; border-radius:8px; transition:0.2s;">
                  <input type="radio" name="payment_method" value="bri_va" style="accent-color:var(--color-accent);"/>
                  <span style="font-weight:500;">BRI Virtual Account</span>
                </label>
                <label style="display:flex; align-items:center; gap:12px; cursor:pointer; padding:12px; border:1px solid #cbd5e1; border-radius:8px; transition:0.2s;">
                  <input type="radio" name="payment_method" value="gopay" style="accent-color:var(--color-accent);"/>
                  <span style="font-weight:500;">GoPay</span>
                </label>
              </div>

              <!-- Error Box -->
              <div id="checkout-error" style="background:#fef2f2; color:#ef4444; padding:12px 16px; border-radius:8px; margin-top:20px; font-size:0.9rem; display:none; border:1px solid #fecaca;"></div>
              
              <!-- Submit Button -->
              <button type="submit" id="btn-submit-checkout" class="btn" style="width:100%; padding:18px; margin-top:24px; font-weight:700; font-size:1.1rem; border-radius:8px; background:#0f172a; color:#fff; cursor:pointer; border:none; transition:0.2s;">
                BUAT PESANAN SEKARANG
              </button>
            </div>

          </div>

        </div>
      </form>
    </div>
  </main>

  <!-- FOOTER -->
  <footer id="footer" class="footer">
    <div class="footer__bottom" style="border-top:none;">
      <div class="footer__bottom-center">
        <span>© 2026 HOMEDRESS_NA - Pembayaran Aman 🔒</span>
      </div>
    </div>
  </footer>

  <script src="/products-data.js"></script>
  <script type="module" src="/main.js"></script>
</body>
</html>
