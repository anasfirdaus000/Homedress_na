<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Detail | HOMEDRESS_NA</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.svg" />
  <meta name="description" content="Shop premium homedress, athleisure, and lifestyle fashion at HOMEDRESS_NA." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!-- ANNOUNCEMENT BAR -->
  <div id="announcement-bar" class="announcement-bar">
    <div class="announcement-bar__track">
      <div class="announcement-bar__items">
        <span class="announcement-bar__item">SPRING SALE NOW LIVE</span>
        <span class="announcement-bar__item">Shop in store - Liverpool One</span>
        <span class="announcement-bar__item">SPRING SALE NOW LIVE</span>
        <span class="announcement-bar__item">Shop in store - Liverpool One</span>
        <span class="announcement-bar__item">SPRING SALE NOW LIVE</span>
        <span class="announcement-bar__item">Shop in store - Liverpool One</span>
        <span class="announcement-bar__item">SPRING SALE NOW LIVE</span>
        <span class="announcement-bar__item">Shop in store - Liverpool One</span>
      </div>
    </div>
  </div>

  <!-- HEADER -->
  <!-- HEADER -->
  <header id="header" class="header header--transparent">
    <div class="header__inner">
      <div class="header__left"></div>
      <div class="header__center">
        <a href="/" id="logo" class="header__logo">HOMEDRESS_NA</a>
      </div>
      <div class="header__right">
        <button class="header__icon-btn" data-action="open-account">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
        <button class="header__icon-btn" data-action="open-wishlist">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
        <button id="cart-toggle" class="header__icon-btn" data-action="open-cart">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span class="header-badge" id="cart-count">0</span>
        </button>
      </div>
    </div>
    <nav id="main-nav" class="header__nav"></nav>
  </header>

<main style="padding-top: 130px; padding-bottom: 80px;">
  <div class="pdp-container">
    <!-- BREADCRUMBS -->
    <div class="breadcrumbs pdp-breadcrumbs">
      <a href="/">Home</a> / <a href="/category.html">Semua Produk</a> / <span id="pdp-breadcrumb-name">Loading...</span>
    </div>

    <div class="pdp-layout">
      <!-- LEFT: GALLERY (dynamic) -->
      <div class="pdp-gallery" id="pdp-gallery"></div>

      <!-- RIGHT: INFO (dynamic) -->
      <div class="pdp-info">
        <div class="pdp-info__sticky" id="pdp-info-content">
          <p style="padding:60px 0;text-align:center;color:var(--color-fg-light);">Memuat produk...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- RELATED PRODUCTS -->
  <section class="section pdp-related">
    <div class="section__header pdp-related__header">
      <h2 class="section__title">You may also like</h2>
      <a href="/category.html" class="section__link">SHOP NOW</a>
    </div>
    <div class="product-grid product-grid--5" id="pdp-related-grid"></div>
  </section>
</main>

  <!-- FOOTER -->
  <footer id="footer" class="footer"></footer>

  <script src="/products-data.js"></script>
  <script type="module" src="/main.js"></script>
  <script type="module">
  document.addEventListener('DOMContentLoaded', async function() {
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug');
    
    if (!slug) {
      window.location.href = '/category.html';
      return;
    }

    let product = null;
    let allProducts = [];

    try {
      // 1. Fetch main product
      const res = await fetch(`/api/products?slug=${slug}`);
      if (res.ok) {
        const data = await res.json();
        product = data.product;
      }

      // 2. Fetch related products (for the "You may also like" section)
      const relatedRes = await fetch('/api/products?limit=5');
      if (relatedRes.ok) {
        const data = await relatedRes.json();
        allProducts = data.products || [];
      }
    } catch (err) {
      console.error('Fetch error:', err);
    }
    
    if (!product) {
      document.getElementById('pdp-info-content').innerHTML = `
        <div style="padding:60px 0;text-align:center;">
          <h2 style="margin-bottom:16px;">Produk tidak ditemukan</h2>
          <p style="color:#666; margin-bottom:24px;">Maaf, produk yang Anda cari mungkin sudah tidak tersedia atau link salah.</p>
          <a href="/category.html" class="btn btn--primary" style="padding:12px 24px; text-decoration:none;">Lihat Semua Produk</a>
        </div>`;
      return;
    }

    // NORMALIZE
    product.brand = product.brand || 'HOMEDRESS_NA';
    product.images = Array.isArray(product.images) ? product.images : (typeof product.images === 'string' ? JSON.parse(product.images) : []);
    product.variants = Array.isArray(product.variants) ? product.variants : (typeof product.variants === 'string' ? JSON.parse(product.variants) : []);
    product.details = Array.isArray(product.details) ? product.details : (typeof product.details === 'string' ? JSON.parse(product.details) : []);
    
    document.title = `${product.name} | HOMEDRESS_NA`;
    const bc = document.getElementById('pdp-breadcrumb-name');
    if (bc) bc.textContent = product.name;

    // 1. GALLERY
    const gallery = document.getElementById('pdp-gallery');
    let galleryHTML = '';
    if (product.images.length > 0) {
      product.images.forEach((img, i) => {
        galleryHTML += `
          <div class="pdp-gallery__item pdp-gallery__item--full">
            <img src="${img}" alt="${product.name}" class="pdp-gallery__img" loading="lazy" />
          </div>`;
      });
    } else {
      galleryHTML = '<div class="pdp-gallery__item pdp-gallery__item--full"><img src="/images/placeholder.jpg" class="pdp-gallery__img" /></div>';
    }
    gallery.innerHTML = galleryHTML;

    // 1. UPDATE SEO METADATA
    if (product) {
      document.title = `${product.name} | HOMEDRESS_NA`;
      const metaDesc = document.querySelector('meta[name="description"]');
      if (metaDesc) metaDesc.setAttribute('content', product.description || `Beli ${product.name} di HOMEDRESS_NA. Kualitas premium, harga terjangkau.`);
    }

    // 2. VARIANTS PROCESSING
    let colors = [...new Set(product.variants.map(v => v.color).filter(Boolean))];
    let sizes = [...new Set(product.variants.map(v => v.size).filter(Boolean))];
    let selectedColor = colors[0] || null;
    let selectedSize = sizes[0] || null;

    function updatePrice() {
      let currentPrice = product.price;
      let currentOriginalPrice = product.original_price || product.price;
      
      const matchingVar = product.variants.find(v => 
        (!selectedColor || v.color === selectedColor) && 
        (!selectedSize || v.size === selectedSize)
      );
      
      if (matchingVar && matchingVar.price) currentPrice = matchingVar.price;
      
      const discount = currentOriginalPrice > currentPrice ? Math.round((1 - currentPrice / currentOriginalPrice) * 100) : 0;
      const pContainer = document.getElementById('dynamic-price-container');
      
      if (pContainer) {
        if (discount > 0) {
          pContainer.innerHTML = `
            <span class="pdp-info__price pdp-info__price--sale">Rp ${currentPrice.toLocaleString('id-ID')}</span>
            <span class="pdp-info__price pdp-info__price--original">Rp ${currentOriginalPrice.toLocaleString('id-ID')}</span>
            <span class="pdp-info__badge">-${discount}% OFF</span>`;
        } else {
          pContainer.innerHTML = `<span class="pdp-info__price">Rp ${currentPrice.toLocaleString('id-ID')}</span>`;
        }
      }
      return currentPrice;
    }

    // 3. RENDER INFO PANEL
    let variantsHTML = '';
    if (colors.length > 0) {
      variantsHTML += `
        <div class="pdp-size">
          <span class="pdp-size__label">WARNA: <strong id="selected-color-name">${selectedColor}</strong></span>
          <div class="pdp-size__grid">
            ${colors.map(c => `<button class="pdp-size__btn color-btn ${c === selectedColor ? 'pdp-size__btn--active' : ''}" data-value="${c}">${c}</button>`).join('')}
          </div>
        </div>`;
    }
    if (sizes.length > 0) {
      variantsHTML += `
        <div class="pdp-size">
          <span class="pdp-size__label">UKURAN: <strong id="selected-size-name">${selectedSize}</strong></span>
          <div class="pdp-size__grid">
            ${sizes.map(s => `<button class="pdp-size__btn size-btn ${s === selectedSize ? 'pdp-size__btn--active' : ''}" data-value="${s}">${s}</button>`).join('')}
          </div>
        </div>`;
    }

    document.getElementById('pdp-info-content').innerHTML = `
      <h2 class="pdp-info__brand">${product.brand}</h2>
      <h1 class="pdp-info__title">${product.name}</h1>
      <div class="pdp-info__price-row" id="dynamic-price-container"></div>
      ${variantsHTML}
      <button class="pdp-btn-cart" id="btn-add-to-cart">TAMBAH KE KERANJANG</button>
      <div class="pdp-accordions">
        <details class="pdp-accordion" open>
          <summary class="pdp-accordion__summary">Deskripsi Produk <span>+</span></summary>
          <div class="pdp-accordion__content">${product.description || 'Tidak ada deskripsi.'}</div>
        </details>
        ${product.details.length > 0 ? `
        <details class="pdp-accordion">
          <summary class="pdp-accordion__summary">Detail Material <span>+</span></summary>
          <div class="pdp-accordion__content"><ul>${product.details.map(d => `<li>${d}</li>`).join('')}</ul></div>
        </details>` : ''}
      </div>
    `;

    // 4. ATTACH EVENTS
    document.querySelectorAll('.color-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('pdp-size__btn--active'));
        btn.classList.add('pdp-size__btn--active');
        selectedColor = btn.dataset.value;
        document.getElementById('selected-color-name').textContent = selectedColor;
        updatePrice();
      });
    });

    document.querySelectorAll('.size-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('pdp-size__btn--active'));
        btn.classList.add('pdp-size__btn--active');
        selectedSize = btn.dataset.value;
        document.getElementById('selected-size-name').textContent = selectedSize;
        updatePrice();
      });
    });

    updatePrice();

    // 5. RELATED PRODUCTS
    const relatedGrid = document.getElementById('pdp-related-grid');
    if (relatedGrid) {
      const related = allProducts.filter(p => p.slug !== product.slug).slice(0, 5);
      relatedGrid.innerHTML = related.map(p => `
        <div class="product-card" onclick="window.location.href='/product.html?slug=${p.slug}'">
          <div class="product-card__image-wrapper">
            <img src="${p.images?.[0] || ''}" alt="${p.name}" class="product-card__image" loading="lazy" />
          </div>
          <div class="product-card__info">
            <p class="product-card__name">${p.name}</p>
            <p class="product-card__price">Rp ${p.price.toLocaleString('id-ID')}</p>
          </div>
        </div>`).join('');
    }

    // 6. ADD TO CART
    const addToCartFn = () => {
      const price = updatePrice();
      if (window.CART) {
        window.CART.add({
          id: product.id || product.slug,
          name: product.name,
          price: price,
          images: product.images,
          img: Array.isArray(product.images) ? product.images[0] : product.images,
          size: selectedSize,
          color: selectedColor,
          qty: 1
        }, document.querySelector('.pdp-gallery__img')); // Fly from first gallery img
        showToast(`${product.name} berhasil ditambah!`);
      }
    };

    document.getElementById('btn-add-to-cart').addEventListener('click', addToCartFn);

    // 7. FLOATING BUY BUTTON (MOBILE)
    const floatingBuy = document.createElement('div');
    floatingBuy.className = 'floating-buy';
    floatingBuy.innerHTML = `
      <div class="floating-buy__info">
        <p class="floating-buy__name">${product.name}</p>
        <p class="floating-buy__price">Rp ${product.price.toLocaleString('id-ID')}</p>
      </div>
      <button class="floating-buy__btn">BELI SEKARANG</button>
    `;
    document.body.appendChild(floatingBuy);

    window.addEventListener('scroll', () => {
      const btn = document.getElementById('btn-add-to-cart');
      if (!btn) return;
      const rect = btn.getBoundingClientRect();
      if (rect.top < 0) {
        floatingBuy.classList.add('is-visible');
      } else {
        floatingBuy.classList.remove('is-visible');
      }
    }, { passive: true });

    floatingBuy.querySelector('.floating-buy__btn').onclick = addToCartFn;

    // 8. ADVANCED ZOOM
    document.querySelectorAll('.pdp-gallery__item').forEach(item => {
      const img = item.querySelector('img');
      item.addEventListener('mousemove', (e) => {
        const rect = item.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;
        img.style.transformOrigin = `${x}% ${y}%`;
        img.style.transform = 'scale(2)';
      });
      item.addEventListener('mouseleave', () => {
        img.style.transform = 'scale(1)';
        img.style.transformOrigin = 'center center';
      });
    });
  });
  </script>
</body>
</html>
